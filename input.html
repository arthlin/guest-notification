<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遠端來賓通知系統 - 輸入</title>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 520px;
      max-width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .status-bar {
      text-align: center;
      margin-bottom: 24px;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-badge.online { background: #d1fae5; color: #065f46; }
    .status-badge.offline { background: #fee2e2; color: #991b1b; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    label .required { color: #e74c3c; margin-left: 2px; }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    textarea { resize: vertical; min-height: 60px; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-batch {
      background: #059669;
      margin-top: 0;
    }
    .btn-batch:hover:not(:disabled) { background: #047857; }
    .hint {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 16px;
    }
    .links {
      text-align: center;
      margin-top: 20px;
    }
    .links a {
      color: #4f46e5;
      text-decoration: none;
      font-size: 14px;
    }
    .links a:hover { text-decoration: underline; }
    .toast {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      text-align: center;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .toast.success { background: #d1fae5; color: #065f46; display: block; }
    .toast.error { background: #fee2e2; color: #991b1b; display: block; }
    .toast.info { background: #dbeafe; color: #1e40af; display: block; }
    .section-divider {
      text-align: center;
      margin: 28px 0 24px;
      border-top: 1px solid #e5e7eb;
      padding-top: 24px;
      font-size: 14px;
      color: #9ca3af;
    }
    .section-divider span {
      background: #f0f2f5;
      padding: 0 12px;
    }
    .batch-hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .batch-counter {
      text-align: right;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .progress-area {
      display: none;
      margin-top: 12px;
    }
    .progress-area.active { display: block; }
    .progress-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5, #6366f1);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 3px;
    }
    .progress-bar .fill.error { background: linear-gradient(90deg, #ef4444, #f87171); }
    .progress-bar .fill.done { background: linear-gradient(90deg, #059669, #34d399); }
    .result-count {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .shortcut-hint {
      text-align: right;
      font-size: 11px;
      color: #b0b0b0;
      margin-top: 2px;
    }
    .template-bar {
      margin-top: 16px;
      padding: 14px;
      background: #f8f9ff;
      border: 1px solid #e0e7ff;
      border-radius: 10px;
    }
    .template-label {
      font-size: 13px;
      font-weight: 600;
      color: #4338ca;
      margin-bottom: 8px;
      display: block;
    }
    .template-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .template-select {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: white;
      min-width: 0;
    }
    .template-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .btn-sm {
      padding: 8px 14px;
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-sm:hover:not(:disabled) { background: #eef2ff; }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-load { color: #4f46e5; }
    .btn-load:hover:not(:disabled) { background: #4f46e5; color: white; }
    .btn-save { color: #059669; }
    .btn-save:hover:not(:disabled) { background: #059669; color: white; }
    .btn-del-tpl { color: #ef4444; }
    .btn-del-tpl:hover:not(:disabled) { background: #ef4444; color: white; }
    .tpl-count {
      font-size: 11px;
      font-weight: 400;
      color: #9ca3af;
    }
    .save-dialog-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .save-dialog-overlay.active { display: flex; }
    .save-dialog {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 340px;
      max-width: 90vw;
      animation: fadeIn 0.2s;
    }
    .save-dialog h3 { font-size: 16px; margin-bottom: 16px; color: #1f2937; }
    .save-dialog input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    .save-dialog input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .save-dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-dialog-cancel { padding: 8px 20px; border: 1px solid #d1d5db; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
    .btn-dialog-confirm { padding: 8px 20px; border: none; border-radius: 8px; background: #4f46e5; color: white; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-dialog-confirm:hover { background: #4338ca; }
    .btn-dialog-cancel:hover { background: #f3f4f6; }
    .qrcode-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .qrcode-overlay.active { display: flex; }
    .qrcode-box {
      background: white;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      animation: fadeIn 0.2s;
    }
    .qrcode-box img { width: 220px; height: 220px; display: block; margin: 0 auto 16px; border-radius: 8px; }
    .qrcode-box .url { font-size: 12px; color: #9ca3af; word-break: break-all; margin-bottom: 16px; }
    .qrcode-box .btn-close { padding: 8px 24px; border: 1px solid #d1d5db; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; }
    .qrcode-box .btn-close:hover { background: #f3f4f6; }
    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 22px; }
    }
  /* ── Dark Mode ── */
  body.dark { background: #0f0f1a; }
  body.dark .container { background: #1e1e32; }
  body.dark h1 { color: #e2e8f0; }
  body.dark label { color: #cbd5e1; }
  body.dark .status-badge.online { background: #064e3b; color: #6ee7b7; }
  body.dark .status-badge.offline { background: #7f1d1d; color: #fca5a5; }
  body.dark input, body.dark textarea { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark input:focus, body.dark textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  body.dark .btn { background: #6366f1; }
  body.dark .btn:hover { background: #4f46e5; }
  body.dark .btn:disabled { background: #4b5563; }
  body.dark .btn-batch { background: #059669; }
  body.dark .btn-batch:hover:not(:disabled) { background: #047857; }
  body.dark .hint, body.dark .batch-hint, body.dark .batch-counter, body.dark .result-count { color: #6b7280; }
  body.dark .shortcut-hint { color: #4b5563; }
  body.dark .links a { color: #818cf8; }
  body.dark .section-divider { border-top-color: #374151; }
  body.dark .section-divider span { background: #0f0f1a; color: #6b7280; }
  body.dark .progress-bar { background: #374151; }
  body.dark .toast.success { background: #064e3b; color: #6ee7b7; }
  body.dark .toast.error { background: #7f1d1d; color: #fca5a5; }
  body.dark .toast.info { background: #1e3a5f; color: #93c5fd; }
  body.dark .template-bar { background: #1a1a30; border-color: #374151; }
  body.dark .template-label { color: #a5b4fc; }
  body.dark .tpl-count { color: #6b7280; }
  body.dark .template-select { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark .template-select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  body.dark .btn-sm { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark .btn-load { color: #818cf8; }
  body.dark .btn-load:hover:not(:disabled) { background: #6366f1; color: white; }
  body.dark .btn-save { color: #34d399; }
  body.dark .btn-save:hover:not(:disabled) { background: #059669; color: white; }
  body.dark .btn-del-tpl { color: #f87171; }
  body.dark .btn-del-tpl:hover:not(:disabled) { background: #ef4444; color: white; }
  body.dark .save-dialog { background: #1e1e32; }
  body.dark .save-dialog h3 { color: #e2e8f0; }
  body.dark .save-dialog input { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark .save-dialog input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  body.dark .btn-dialog-cancel { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark .btn-dialog-cancel:hover { background: #374151; }
  body.dark .btn-dialog-confirm { background: #6366f1; }
  body.dark .btn-dialog-confirm:hover { background: #4f46e5; }
  body.dark .qrcode-box { background: #1e1e32; }
  body.dark .qrcode-box .url { color: #6b7280; }
  body.dark .qrcode-box .btn-close { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  body.dark .qrcode-box .btn-close:hover { background: #374151; }
  body.dark .save-dialog-overlay, body.dark .qrcode-overlay { background: rgba(0,0,0,0.7); }
  /* ── Dark Mode Toggle ── */
  .dark-toggle {
    position: fixed; top: 16px; right: 16px;
    width: 36px; height: 36px;
    border: 1px solid #d1d5db; border-radius: 50%;
    background: white; color: #374151;
    font-size: 18px; cursor: pointer; outline: none;
    display: flex; align-items: center; justify-content: center;
    z-index: 50; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    line-height: 1;
  }
  body.dark .dark-toggle { background: #2d2d44; color: #e2e8f0; border-color: #374151; }
  .dark-toggle:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  /* ── Skeleton Loading ── */
  @keyframes skeleton-pulse {
    0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; }
  }
  .skeleton-cell {
    height: 18px; border-radius: 4px;
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%;
    animation: skeleton-pulse 1.8s ease-in-out infinite;
  }
  body.dark .skeleton-cell {
    background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
  }
  /* ── Row Animation ── */
  @keyframes row-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .row-enter { animation: row-in 0.3s ease forwards; }
  /* ── Print Styles ── */
  @media print {
    body { background: white; padding: 0; }
    .dark-toggle, .status-bar, .links, .btn, .btn-batch,
    .template-bar, .progress-area, .hint, .batch-hint, .shortcut-hint, .batch-counter,
    .section-divider, .save-dialog-overlay, .qrcode-overlay { display: none !important; }
    .container { box-shadow: none; border: none; padding: 0; }
  }
  </style>
</head>
<body>
  <div class="container">
    <h1>遠端來賓通知</h1>
    <div class="status-bar">
      <span class="status-badge online" id="statusBadge">連線正常</span>
    </div>
    <button class="dark-toggle" id="darkToggle" title="切換暗色模式">☾</button>
    <div id="toast" class="toast"></div>

    <form id="guestForm">
      <div class="form-group">
        <label>姓名 <span class="required">*</span></label>
        <input type="text" id="name" required placeholder="請輸入姓名" autocomplete="off">
      </div>
      <div class="form-group">
        <label>單位名稱</label>
        <input type="text" id="org" placeholder="請輸入單位名稱（選填）" autocomplete="off">
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="note" placeholder="請輸入備註（選填）" rows="2"></textarea>
      </div>
      <button type="submit" class="btn" id="submitBtn">送出通知</button>
    </form>
    <p class="hint">※ 只有姓名必填，單位與備註可留白</p>

    <div class="section-divider"><span>批次輸入</span></div>

    <div class="form-group">
      <label>批次貼入（每行一筆，逗號分隔）</label>
      <textarea id="batchInput" rows="6" placeholder="姓名1, 單位1, 備註1&#10;姓名2, 單位2, 備註2&#10;姓名3, 單位3,"></textarea>
      <div class="batch-counter"><span id="lineCount">0</span> 行</div>
      <p class="batch-hint">格式：姓名, 單位, 備註（全形半形逗號皆可，單位和備註可留空）</p>
      <p class="shortcut-hint">快捷鍵：Ctrl + Enter</p>
    </div>
    <button class="btn btn-batch" id="batchBtn">批次送出</button>

    <div class="template-bar" id="templateBar">
      <label class="template-label">範本清單 <span class="tpl-count" id="tplCount"></span></label>
      <div class="template-row">
        <select class="template-select" id="templateSelect">
          <option value="">-- 選擇範本 --</option>
        </select>
        <button class="btn-sm btn-load" id="templateLoadBtn" disabled>載入</button>
        <button class="btn-sm btn-save" id="templateSaveBtn">新增</button>
        <button class="btn-sm btn-del-tpl" id="templateDelBtn" disabled>刪除</button>
      </div>
    </div>

    <div class="progress-area" id="progressArea">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="result-count" id="resultCount"></div>
    </div>

    <div class="links">
      <a href="output.html">檢視來賓清單</a>
      <span style="margin:0 8px;color:#d1d5db">|</span>
      <a href="#" id="qrBtn">顯示 QR Code</a>
    </div>
  </div>

  <!-- QR Code -->
  <div class="qrcode-overlay" id="qrOverlay">
    <div class="qrcode-box">
      <img id="qrImg" alt="QR Code">
      <div class="url" id="qrUrl"></div>
      <button class="btn-close" id="qrClose">關閉</button>
    </div>
  </div>

  <!-- 另存範本對話框 -->
  <div class="save-dialog-overlay" id="saveDialog">
    <div class="save-dialog">
      <h3>另存批次清單為範本</h3>
      <input type="text" id="saveDialogInput" placeholder="輸入範本名稱..." maxlength="30" autocomplete="off">
      <div class="save-dialog-actions">
        <button class="btn-dialog-cancel" id="saveDialogCancel">取消</button>
        <button class="btn-dialog-confirm" id="saveDialogConfirm">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('guestForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');
    const statusBadge = document.getElementById('statusBadge');
    const batchInput = document.getElementById('batchInput');
    const batchBtn = document.getElementById('batchBtn');
    const lineCount = document.getElementById('lineCount');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const resultCount = document.getElementById('resultCount');

    // Connection status
    let firestoreConnected = window.navigator.onLine;

    function updateConnectionStatus() {
      const online = window.navigator.onLine;
      firestoreConnected = online;
      statusBadge.textContent = online ? '連線正常' : '網路離線';
      statusBadge.className = `status-badge ${online ? 'online' : 'offline'}`;
    }

    window.addEventListener('offline', updateConnectionStatus);
    window.addEventListener('online', updateConnectionStatus);

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    function genSortOrder(offset = 0) {
      return Date.now() + offset;
    }

    // Single submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const org = document.getElementById('org').value.trim();
      const note = document.getElementById('note').value.trim();

      if (!name) {
        showToast('請輸入姓名', 'error');
        document.getElementById('name').focus();
        return;
      }

      if (!firestoreConnected) {
        showToast('目前離線，請稍後再試', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '送出中...';

      try {
        await db.collection('guests').add({
          name,
          org,
          note,
          sortOrder: genSortOrder(),
          checkedIn: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('送出成功！', 'success');
        form.reset();
        document.getElementById('name').focus();
      } catch (err) {
        console.error(err);
        showToast('送出失敗，請稍後再試', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '送出通知';
      }
    });

    // Batch line counter
    batchInput.addEventListener('input', () => {
      const lines = batchInput.value.split('\n').filter(l => l.trim());
      lineCount.textContent = lines.length;
    });

    // Batch submission
    async function submitBatch() {
      const text = batchInput.value.trim();
      if (!text) {
        showToast('請貼入要批次輸入的資料', 'error');
        return;
      }

      if (!firestoreConnected) {
        showToast('目前離線，請稍後再試', 'error');
        return;
      }

      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const guests = lines.map((line, i) => {
        const parts = line.split(/[,，]/).map(s => s.trim());
        return { name: parts[0] || '', org: parts[1] || '', note: parts[2] || '', sortOrder: genSortOrder(i) };
      });

      const valid = guests.filter(g => g.name);
      if (valid.length === 0) {
        showToast('沒有有效的資料（姓名必填）', 'error');
        return;
      }

      batchBtn.disabled = true;
      batchBtn.textContent = '送出中...';
      progressArea.classList.add('active');
      progressFill.className = 'fill';
      updateProgress(0, valid.length);

      const BATCH_LIMIT = 500;
      let success = 0;
      let fail = 0;

      for (let i = 0; i < valid.length; i += BATCH_LIMIT) {
        const chunk = valid.slice(i, i + BATCH_LIMIT);
        const batch = db.batch();
        chunk.forEach(g => {
          const ref = db.collection('guests').doc();
          batch.set(ref, {
            name: g.name,
            org: g.org,
            note: g.note,
            sortOrder: g.sortOrder,
            checkedIn: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        try {
          await batch.commit();
          success += chunk.length;
        } catch (err) {
          console.error('批次失敗:', err);
          fail += chunk.length;
        }
        updateProgress(success + fail, valid.length);
      }

      progressFill.className = fail === 0 ? 'fill done' : fail >= success ? 'fill error' : 'fill';

      if (fail === 0) {
        showToast(`${success} 筆全部送出成功！`, 'success');
        batchInput.value = '';
        lineCount.textContent = '0';
      } else if (success > 0) {
        showToast(`${success} 筆成功，${fail} 筆失敗`, 'info');
      } else {
        showToast('批次送出全部失敗', 'error');
      }

      batchBtn.disabled = false;
      batchBtn.textContent = '批次送出';
      setTimeout(() => { progressArea.classList.remove('active'); }, 3000);
    }

    function updateProgress(done, total) {
      const pct = total > 0 ? (done / total) * 100 : 0;
      progressFill.style.width = `${pct}%`;
      resultCount.textContent = `${done} / ${total}`;
    }

    batchBtn.addEventListener('click', submitBatch);

    batchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        submitBatch();
      }
    });

    // ── 範本管理 (Firestore) ──
    const templateSelect = document.getElementById('templateSelect');
    const templateLoadBtn = document.getElementById('templateLoadBtn');
    const templateSaveBtn = document.getElementById('templateSaveBtn');
    const templateDelBtn = document.getElementById('templateDelBtn');
    const tplCount = document.getElementById('tplCount');
    const saveDialog = document.getElementById('saveDialog');
    const saveDialogInput = document.getElementById('saveDialogInput');
    const saveDialogConfirm = document.getElementById('saveDialogConfirm');
    const saveDialogCancel = document.getElementById('saveDialogCancel');
    let templatesCache = [];

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    let unsubscribeTpl = null;

    function startTemplatesListener() {
      if (unsubscribeTpl) unsubscribeTpl();
      unsubscribeTpl = db.collection('templates').orderBy('name')
        .onSnapshot((snap) => {
          templatesCache = [];
          snap.forEach(doc => { const d = doc.data(); templatesCache.push({ id: doc.id, name: d.name, lines: d.lines || [], count: d.count || 0 }); });
          refreshTemplateSelect();
        }, (err) => { console.error('範本監聽失敗:', err); });
    }

    function refreshTemplateSelect() {
      const val = templateSelect.value;
      templateSelect.innerHTML = '<option value="">-- 選擇範本 --</option>' +
        templatesCache.map((t, i) => `<option value="${i}">${escHtml(t.name)} (${t.count} 位)</option>`).join('');
      templateSelect.value = templatesCache.find(t => t.name === val) ? val : '';
      templateLoadBtn.disabled = !templateSelect.value;
      templateDelBtn.disabled = !templateSelect.value;
      tplCount.textContent = templatesCache.length ? `(${templatesCache.length} 個)` : '';
    }

    templateLoadBtn.addEventListener('click', () => {
      const idx = parseInt(templateSelect.value);
      if (isNaN(idx)) return;
      const tpl = templatesCache[idx];
      if (!tpl) return;
      batchInput.value = tpl.lines.join('\n');
      batchInput.dispatchEvent(new Event('input'));
      showToast(`已載入「${tpl.name}」(${tpl.count} 位)`, 'success');
    });

    templateSaveBtn.addEventListener('click', () => {
      const text = batchInput.value.trim();
      if (!text) { showToast('批次區沒有資料可儲存', 'error'); return; }
      saveDialogInput.value = '';
      saveDialog.classList.add('active');
      setTimeout(() => saveDialogInput.focus(), 100);
    });

    saveDialogConfirm.addEventListener('click', async () => {
      const name = saveDialogInput.value.trim();
      if (!name) { showToast('請輸入範本名稱', 'error'); return; }
      const text = batchInput.value.trim();
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      try {
        const q = await db.collection('templates').where('name', '==', name).get();
        const entry = { name, lines, count: lines.length, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if (!q.empty) await db.collection('templates').doc(q.docs[0].id).update(entry);
        else await db.collection('templates').add(entry);
        templateSelect.value = name;
        saveDialog.classList.remove('active');
        showToast(`範本「${name}」已儲存`, 'success');
      } catch (err) { console.error(err); showToast('儲存範本失敗', 'error'); }
    });

    saveDialogCancel.addEventListener('click', () => saveDialog.classList.remove('active'));
    saveDialogInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveDialogConfirm.click(); if (e.key === 'Escape') saveDialog.classList.remove('active'); });
    saveDialog.addEventListener('click', (e) => { if (e.target === saveDialog) saveDialog.classList.remove('active'); });

    templateDelBtn.addEventListener('click', async () => {
      const idx = parseInt(templateSelect.value);
      if (isNaN(idx)) return;
      const tpl = templatesCache[idx];
      try {
        await db.collection('templates').doc(tpl.id).delete();
        showToast(`範本「${tpl.name}」已刪除`, 'info');
      } catch (err) { console.error(err); showToast('刪除範本失敗', 'error'); }
    });

    templateSelect.addEventListener('change', () => {
      templateLoadBtn.disabled = !templateSelect.value;
      templateDelBtn.disabled = !templateSelect.value;
    });

    startTemplatesListener();

    // ── QR Code ──
    const qrBtn = document.getElementById('qrBtn');
    const qrOverlay = document.getElementById('qrOverlay');
    const qrImg = document.getElementById('qrImg');
    const qrUrl = document.getElementById('qrUrl');
    const qrClose = document.getElementById('qrClose');

    qrBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const url = window.location.href.replace(/\/[^/]*\.html$/, '/input.html');
      qrUrl.textContent = url;
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;
      qrImg.onerror = () => { qrImg.style.display = 'none'; qrUrl.textContent = 'QR Code 載入失敗'; };
      qrOverlay.classList.add('active');
    });

    qrClose.addEventListener('click', () => qrOverlay.classList.remove('active'));
    qrOverlay.addEventListener('click', (e) => { if (e.target === qrOverlay) qrOverlay.classList.remove('active'); });

    // ── Dark Mode ──
    function initDarkMode() {
      if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
      updateDarkBtn();
    }
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
      updateDarkBtn();
    }
    function updateDarkBtn() {
      const btn = document.getElementById('darkToggle');
      if (!btn) return;
      const dark = document.body.classList.contains('dark');
      btn.textContent = dark ? '\u2600' : '\u263E';
      btn.title = dark ? '切換亮色模式' : '切換暗色模式';
    }
    document.getElementById('darkToggle').addEventListener('click', toggleDarkMode);
    initDarkMode();

    // Leave page warning
    window.addEventListener('beforeunload', (e) => {
      if (batchInput.value.trim()) { e.preventDefault(); e.returnValue = ''; }
    });

    // Auto-focus name field
    document.getElementById('name').focus();
  </script>
</body>
</html>
