<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遠端來賓通知系統 - 輸入</title>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 32px;
      color: #1a1a2e;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    label .required {
      color: #e74c3c;
      margin-left: 2px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .hint {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 16px;
    }
    .links {
      text-align: center;
      margin-top: 20px;
    }
    .links a {
      color: #4f46e5;
      text-decoration: none;
      font-size: 14px;
    }
    .links a:hover { text-decoration: underline; }
    .toast {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      text-align: center;
    }
    .toast.success { background: #d1fae5; color: #065f46; display: block; }
    .toast.error { background: #fee2e2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 遠端來賓通知</h1>
    <div id="toast" class="toast"></div>
    <form id="guestForm">
      <div class="form-group">
        <label>姓名 <span class="required">*</span></label>
        <input type="text" id="name" required placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label>單位名稱</label>
        <input type="text" id="org" placeholder="請輸入單位名稱（選填）">
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="note" placeholder="請輸入備註（選填）"></textarea>
      </div>
      <button type="submit" class="btn" id="submitBtn">送出通知</button>
    </form>
    <p class="hint">※ 只有姓名必填，單位與備註可留白</p>
    <div class="links">
      <a href="output.html">📋 檢視來賓清單 →</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('guestForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const org = document.getElementById('org').value.trim();
      const note = document.getElementById('note').value.trim();

      if (!name) {
        showToast('請輸入姓名', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '送出中...';

      try {
        await db.collection('guests').add({
          name,
          org,
          note,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('✅ 送出成功！', 'success');
        form.reset();
        document.getElementById('name').focus();
      } catch (err) {
        console.error(err);
        showToast('❌ 送出失敗，請稍後再試', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '送出通知';
      }
    });
  </script>
</body>
</html>
