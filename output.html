<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遠端來賓通知系統 - 顯示</title>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .update-time {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-left {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-refresh {
      background: #4f46e5;
      color: white;
    }
    .btn-refresh:hover:not(:disabled) { background: #4338ca; }
    .btn-clear {
      background: #ef4444;
      color: white;
    }
    .btn-clear:hover:not(:disabled) { background: #dc2626; }
    .btn-back {
      background: #e5e7eb;
      color: #374151;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-back:hover { background: #d1d5db; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    th {
      background: #1a1a2e;
      color: white;
      padding: 14px 16px;
      text-align: left;
      font-size: 15px;
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
      color: #1f2937;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      font-size: 16px;
    }
    .count-badge {
      background: #e5e7eb;
      color: #374151;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .confirm-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
    }
    .confirm-box p {
      font-size: 16px;
      margin-bottom: 24px;
      color: #1f2937;
    }
    .confirm-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-confirm { background: #ef4444; color: white; }
    .btn-confirm:hover { background: #dc2626; }
    .btn-cancel { background: #e5e7eb; color: #374151; }
    .btn-cancel:hover { background: #d1d5db; }
    .btn-icon {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    .btn-icon:hover { background: #f3f4f6; }
    .btn-icon:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-icon-del:hover { background: #fee2e2; border-color: #fca5a5; }
    .action-cell { white-space: nowrap; }
    th:last-child, td:last-child { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 遠端來賓通知清單</h1>
    <p class="update-time" id="updateTime">⏰ 最後更新時間：--</p>

    <div class="toolbar">
      <div class="toolbar-left">
        <a href="input.html" class="btn btn-back">➕ 回到輸入頁</a>
        <span class="count-badge" id="countBadge">0 位來賓</span>
      </div>
      <div>
        <button class="btn btn-refresh" id="refreshBtn">🔄 重新整理</button>
        <button class="btn btn-clear" id="clearBtn">🗑 清空名單</button>
      </div>
    </div>

      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>單位名稱</th>
            <th>備註</th>
            <th style="width:110px">操作</th>
          </tr>
        </thead>
        <tbody id="guestList">
          <tr><td colspan="4" class="loading">載入中...</td></tr>
        </tbody>
      </table>
  </div>

  <!-- 確認清空對話框 -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p>確定要清空所有來賓名單嗎？</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" id="confirmCancel">取消</button>
        <button class="btn btn-confirm" id="confirmOk">確定清空</button>
      </div>
    </div>
  </div>

  <!-- 確認刪除單筆對話框 -->
  <div class="confirm-overlay" id="deleteOverlay">
    <div class="confirm-box">
      <p id="deleteText">確定要刪除這位來賓嗎？</p>
      <div class="confirm-actions">
        <button class="btn btn-cancel" id="deleteCancel">取消</button>
        <button class="btn btn-confirm" id="deleteOk">確定刪除</button>
      </div>
    </div>
  </div>

  <script>
    const guestList = document.getElementById('guestList');
    const updateTime = document.getElementById('updateTime');
    const countBadge = document.getElementById('countBadge');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearBtn = document.getElementById('clearBtn');

    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmOk = document.getElementById('confirmOk');
    const confirmCancel = document.getElementById('confirmCancel');

    const deleteOverlay = document.getElementById('deleteOverlay');
    const deleteText = document.getElementById('deleteText');
    const deleteOk = document.getElementById('deleteOk');
    const deleteCancel = document.getElementById('deleteCancel');

    let guestsCache = [];
    let pendingDeleteId = null;

    function formatTime(date) {
      const d = date instanceof Date ? date : date.toDate();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    async function loadGuests() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = '載入中...';

      try {
        const snapshot = await db.collection('guests').get();
        guestList.innerHTML = `<tr><td colspan="4" class="loading">讀到 ${snapshot.size} 筆資料...</td></tr>`;
        guestsCache = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          guestsCache.push({
            id: doc.id,
            sortOrder: data.sortOrder,
            name: data.name,
            org: data.org,
            note: data.note,
            createdAt: data.createdAt
          });
        });

        guestsCache.sort((a, b) => {
          if (a.sortOrder !== undefined && b.sortOrder !== undefined) return a.sortOrder - b.sortOrder;
          if (a.sortOrder !== undefined) return -1;
          if (b.sortOrder !== undefined) return 1;
          return 0;
        });

        renderGuests(guestsCache);

        const now = new Date();
        updateTime.textContent = `⏰ 最後更新時間：${formatTime(now)}`;
      } catch (err) {
        console.error(err);
        guestList.innerHTML = `<tr><td colspan="4" class="empty">❌ 讀取失敗：${escapeHtml(err.message)}</td></tr>`;
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = '🔄 重新整理';
      }
    }

    function renderGuests(guests) {
      countBadge.textContent = `${guests.length} 位來賓`;

      if (guests.length === 0) {
        guestList.innerHTML = `<tr><td colspan="4" class="empty">目前尚無來賓</td></tr>`;
        return;
      }

      guestList.innerHTML = guests.map((g, i) => `
        <tr data-id="${escapeHtml(g.id)}">
          <td><strong>${escapeHtml(g.name)}</strong></td>
          <td>${escapeHtml(g.org || '')}</td>
          <td>${escapeHtml(g.note || '')}</td>
          <td class="action-cell">
            <button class="btn-icon" data-action="up" data-index="${i}" ${i === 0 ? 'disabled' : ''}>⬆</button>
            <button class="btn-icon" data-action="down" data-index="${i}" ${i === guests.length - 1 ? 'disabled' : ''}>⬇</button>
            <button class="btn-icon btn-icon-del" data-action="delete" data-index="${i}">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function moveGuest(index, direction) {
      const otherIndex = direction === 'up' ? index - 1 : index + 1;
      if (otherIndex < 0 || otherIndex >= guestsCache.length) return;

      const current = guestsCache[index];
      const other = guestsCache[otherIndex];
      const currentOrder = current.sortOrder;
      const otherOrder = other.sortOrder;

      const batch = db.batch();
      batch.update(db.collection('guests').doc(current.id), { sortOrder: otherOrder });
      batch.update(db.collection('guests').doc(other.id), { sortOrder: currentOrder });
      await batch.commit();

      await loadGuests();
    }

    function confirmDelete(id, name) {
      pendingDeleteId = id;
      deleteText.textContent = `確定要刪除「${escapeHtml(name)}」嗎？`;
      deleteOverlay.classList.add('active');
    }

    async function deleteGuest() {
      if (!pendingDeleteId) return;

      deleteOk.disabled = true;
      deleteOk.textContent = '刪除中...';

      try {
        await db.collection('guests').doc(pendingDeleteId).delete();
        await loadGuests();
      } catch (err) {
        console.error(err);
        alert('刪除失敗，請稍後再試');
      } finally {
        deleteOk.disabled = false;
        deleteOk.textContent = '確定刪除';
        deleteOverlay.classList.remove('active');
        pendingDeleteId = null;
      }
    }

    async function clearGuests() {
      confirmOk.disabled = true;
      confirmOk.textContent = '清除中...';

      try {
        const snapshot = await db.collection('guests').get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        await loadGuests();
      } catch (err) {
        console.error(err);
        alert('清除失敗，請稍後再試');
      } finally {
        confirmOk.disabled = false;
        confirmOk.textContent = '確定清空';
        confirmOverlay.classList.remove('active');
      }
    }

    // ── 事件監聽 ──

    refreshBtn.addEventListener('click', loadGuests);

    clearBtn.addEventListener('click', () => {
      confirmOverlay.classList.add('active');
    });

    confirmOk.addEventListener('click', clearGuests);
    confirmCancel.addEventListener('click', () => confirmOverlay.classList.remove('active'));
    confirmOverlay.addEventListener('click', (e) => {
      if (e.target === confirmOverlay) confirmOverlay.classList.remove('active');
    });

    deleteOk.addEventListener('click', deleteGuest);
    deleteCancel.addEventListener('click', () => {
      deleteOverlay.classList.remove('active');
      pendingDeleteId = null;
    });
    deleteOverlay.addEventListener('click', (e) => {
      if (e.target === deleteOverlay) {
        deleteOverlay.classList.remove('active');
        pendingDeleteId = null;
      }
    });

    guestList.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const index = parseInt(btn.dataset.index, 10);
      const action = btn.dataset.action;

      if (action === 'up') moveGuest(index, 'up');
      else if (action === 'down') moveGuest(index, 'down');
      else if (action === 'delete') {
        const guest = guestsCache[index];
        if (guest) confirmDelete(guest.id, guest.name);
      }
    });

    loadGuests();
  </script>
</body>
</html>
